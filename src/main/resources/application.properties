spring.application.name=amazonfindins

# PostgreSQL database settings
spring.datasource.url=jdbc:postgresql://localhost:5432/amazonfindins
spring.datasource.username=postgres
spring.datasource.password=Aashik@786

# JPA creates/updates beginner-friendly tables automatically while developing.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
